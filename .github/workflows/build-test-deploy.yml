name: Build, Test, Deploy
on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lobis/root-geant4-garfield:cpp17_root-v6-26-10_geant4-v11.1.0_garfield-e0a9f171
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ../neutrino_demo/
          pwd; ls -lrt
      
      - name: Build
        run: |
          cd build
          cmake --build . 
          pwd; ls -lrt
      
      - name: Run executable with input file
        run: |
          pwd; ls -lrt
          ldconfig
          ldd ./build/neutrino
          ./build/neutrino neutrino_demo/run.mac
          pwd; ls -lrt
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executable
          path: build/neutrino
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # - name: Download build artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: executable
      #     path: ./build
      
      # - name: Make executable runnable
      #   run: chmod +x ./build/neutrino
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Create Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM ghcr.io/lobis/root-geant4-garfield:cpp17_root-v6-26-10_geant4-v11.1.0_garfield-e0a9f171
          
          # Set working directory
          WORKDIR /app
          
          # Copy and build
          COPY neutrino_demo/ /app/neutrino_demo/
          RUN cmake ./neutrino_demo/ && cmake --build . 

          # Set the entrypoint to the executable
          ENTRYPOINT ["/app/neutrino"]
          EOF
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max